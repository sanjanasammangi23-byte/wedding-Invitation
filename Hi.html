<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Ashok ❤️ Vijaya Wedding</title>

<style>
body {
  margin:0;
  font-family:'Georgia', serif;
  text-align:center;
  background: linear-gradient(to right, #fff5e6, #ffe0cc);
}

/* Animation */
.fade {
  animation: fadeIn 2s ease-in;
}
@keyframes fadeIn {
  from {opacity:0; transform: translateY(30px);}
  to {opacity:1;}
}

.container {
  padding:40px;
}

h1 {
  color:#b76e79;
  font-size:42px;
}

.card {
  background:white;
  padding:25px;
  margin:20px auto;
  max-width:450px;
  border-radius:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* Slideshow */
.slideshow img {
  width:300px;
  height:300px;
  border-radius:15px;
  transition: opacity 1s ease, transform 1s ease;
}

.fade-out {
  opacity:0;
  transform:scale(0.9);
}

.fade-in {
  opacity:1;
  transform:scale(1);
}

#slideText {
  margin-top:10px;
  font-size:18px;
}

/* Countdown */
#countdown {
  font-size:22px;
  color:#e91e63;
}

/* Button */
.btn {
  padding:12px 25px;
  background:#e91e63;
  color:white;
  text-decoration:none;
  border-radius:25px;
}
</style>

</head>

<body>

<!-- 🎶 Background Music -->
<audio id="bgMusic" loop>
  <source src="https://enchanting-turquoise-wdatx1cqrg.edgeone.app/Court-Marriage-Practice-BGM.mp3" type="audio/mpeg">
</audio>

<div class="container fade">

<h1>Ashok ❤️ Vijaya</h1>
<p>With love, we invite you 💍</p>

<!-- 🎶 Tap message -->
<p>🎶 Tap anywhere to start music</p>

<!-- ⏳ Countdown -->
<div id="countdown"></div>

<!-- 💍 Wedding -->
<div class="card">
<h2>Wedding Ceremony</h2>
<p>April 29, 2026 | 11:09 AM</p>
<p>Dwaraka Tirumala 🛕</p>
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=Dwaraka+Tirumala+Temple" target="_blank">View Location</a>
</div>

<!-- 🎉 Reception -->
<div class="card">
<h2>Reception</h2>
<p>May 3, 2026 | 12 Noon onwards</p>
<p>Maharastra Mandal, Visakhapatnam</p>
<a class="btn" href="https://www.google.com/maps/search/?api=1&query=Maharastra+Mandal+Visakhapatnam" target="_blank">View Location</a>
</div>

<!-- 🎬 Slideshow -->
<div class="card">
<h2 id="slideTitle">Ashok ❤️ Vijaya</h2>
<img id="slide" src="https://via.placeholder.com/300">
<p id="slideText"></p>
</div>

<!-- 💌 RSVP -->
<div class="card">
<h2>RSVP</h2>
<input type="text" placeholder="Your Name"><br><br>
<select>
<option>Will you attend?</option>
<option>Yes</option>
<option>No</option>
</select><br><br>
<button class="btn" onclick="alert('Thank you ❤️')">Submit</button>
</div>

</div>

<script>

// 🎶 Music control
var music = document.getElementById("bgMusic");

music.addEventListener("loadedmetadata", function() {
  music.currentTime = 100; // 1:40 start
});

// try autoplay
window.addEventListener("load", function() {
  music.play().catch(()=>{});
});

// click to ensure play
document.addEventListener("click", function() {
  music.play();
}, { once: true });


// ⏳ Countdown
var countDate = new Date("April 29, 2026 11:09:00").getTime();
setInterval(function() {
  var now = new Date().getTime();
  var gap = countDate - now;

  var d = Math.floor(gap / (1000*60*60*24));
  var h = Math.floor((gap % (1000*60*60*24)) / (1000*60*60));
  var m = Math.floor((gap % (1000*60*60)) / (1000*60));
  var s = Math.floor((gap % (1000*60)) / 1000);

  document.getElementById("countdown").innerHTML =
    "Wedding in: " + d + "d " + h + "h " + m + "m " + s + "s";
}, 1000);


// 🎬 Animated Slideshow
var slides = [
  {
    title:"Ashok ❤️ Vijaya",
    text:"We are getting married 💍",
    img:"https://via.placeholder.com/300/ff9a9e"
  },
  {
    title:"Wedding Ceremony 🛕",
    text:"April 29, 2026 | Dwaraka Tirumala",
    img:"https://via.placeholder.com/300/fad0c4"
  },
  {
    title:"Reception 🎉",
    text:"May 3, Visakhapatnam",
    img:"https://via.placeholder.com/300/fbc2eb"
  },
  {
    title:"Our Memories 📸",
    text:"Beautiful moments ❤️",
    img:"https://via.placeholder.com/300/ffe0cc"
  },
  {
    title:"Will you attend? 💌",
    text:"We are waiting for you!",
    img:"https://via.placeholder.com/300/ffc1cc"
  }
];

var i=0;
var slide=document.getElementById("slide");

function changeSlide(){
  slide.classList.add("fade-out");

  setTimeout(function(){
    document.getElementById("slideTitle").innerHTML=slides[i].title;
    document.getElementById("slideText").innerHTML=slides[i].text;
    slide.src=slides[i].img;

    slide.classList.remove("fade-out");
    slide.classList.add("fade-in");

    i=(i+1)%slides.length;
  },800);
}

setInterval(changeSlide,3000);

</script>

</body>
</html>
